name: Terraform Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TF_VERSION: "1.14.5"
  GO_VERSION: "1.26"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build rest provider from source — shared by all jobs ───────────────────
  build-provider:
    name: "Build rest provider"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout rest provider
        if: ${{ !env.ACT }}
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/terraform-provider-rest
          path: .providers/rest
          # For forks/local: override with the actual repo or use a local path
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Build & install rest provider
        run: |
          if [ "$ACT" = "true" ]; then
            .github/scripts/setup-providers.sh /tmp/rest
          else
            .github/scripts/setup-providers.sh .providers/rest
          fi

      - name: Upload provider artifact
        uses: actions/upload-artifact@v7
        with:
          name: terraform-provider-rest
          path: ~/.terraform.d/plugins/
          retention-days: 1

  # ── Discover plan-safe config YAMLs for matrix ──────────────────────────────
  generate-config-matrix:
    name: "Discover config matrix"
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.list.outputs.configs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: List plan-safe configs
        id: list
        run: |
          # Exclude configs that require a live ARM token:
          #   - top-level externals: blocks (live ARM API calls at plan time)
          #   - # ci:requires-live-token marker (e.g. import configs with check_existance)
          # Output basenames without .yaml for clean matrix job names.
          configs=$(grep -rL "^externals:" configurations/*.yaml \
            | xargs grep -rL "^# ci:requires-live-token" \
            | sort \
            | xargs -I{} basename {} .yaml \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "configs=$configs" >> "$GITHUB_OUTPUT"
          echo "Discovered $(echo "$configs" | jq -r 'length') plan-safe configs"

  # ── Discover test files for plan-test and apply-test matrices ───────────────
  generate-test-matrix:
    name: "Discover test matrix"
    runs-on: ubuntu-latest
    outputs:
      plan_tests: ${{ steps.list.outputs.plan_tests }}
      apply_tests: ${{ steps.list.outputs.apply_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: List test files
        id: list
        run: |
          plan_tests='[]'
          apply_tests='[]'

          # ── Plan-safe: tests/azure/config_* ────────────────────────────────
          for f in tests/azure/config_*.tftest.hcl; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .tftest.hcl)
            entry=$(jq -n --arg n "$name" --arg f "$f" --arg d "tests/azure" \
              '{"name":$n,"file":$f,"dir":$d}')
            plan_tests=$(echo "$plan_tests" | jq --argjson e "$entry" '. + [$e]')
          done

          # ── Plan-safe: tests/unit_github_* ─────────────────────────────────
          for f in tests/unit_github_*.tftest.hcl; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .tftest.hcl)
            entry=$(jq -n --arg n "$name" --arg f "$f" --arg d "." \
              '{"name":$n,"file":$f,"dir":$d}')
            plan_tests=$(echo "$plan_tests" | jq --argjson e "$entry" '. + [$e]')
          done

          # ── Plan-safe: tests/integration_config_* (no externals, no ci:requires-live-token)
          for f in tests/integration_config_*.tftest.hcl; do
            [ -f "$f" ] || continue
            cfg_name=$(basename "$f" .tftest.hcl | sed 's/^integration_config_//')
            yaml="configurations/${cfg_name}.yaml"
            if [ -f "$yaml" ] \
              && ! grep -q "^externals:" "$yaml" \
              && ! grep -q "^# ci:requires-live-token" "$yaml"; then
              name=$(basename "$f" .tftest.hcl)
              entry=$(jq -n --arg n "$name" --arg f "$f" --arg d "." \
                '{"name":$n,"file":$f,"dir":$d}')
              plan_tests=$(echo "$plan_tests" | jq --argjson e "$entry" '. + [$e]')
            fi
          done

          # ── Apply: tests/azure/ non-config (resource/integration apply tests)
          for f in tests/azure/*.tftest.hcl; do
            [ -f "$f" ] || continue
            [[ "$(basename "$f")" == config_* ]] && continue
            name=$(basename "$f" .tftest.hcl)
            entry=$(jq -n --arg n "$name" --arg f "$f" --arg d "tests/azure" \
              '{"name":$n,"file":$f,"dir":$d}')
            apply_tests=$(echo "$apply_tests" | jq --argjson e "$entry" '. + [$e]')
          done

          # ── Apply: tests/unit_azure_* + tests/integration_azure_* (skip ci:skip)
          for f in tests/unit_azure_*.tftest.hcl tests/integration_azure_*.tftest.hcl; do
            [ -f "$f" ] || continue
            grep -q "^# ci:skip" "$f" && continue
            name=$(basename "$f" .tftest.hcl)
            entry=$(jq -n --arg n "$name" --arg f "$f" --arg d "." \
              '{"name":$n,"file":$f,"dir":$d}')
            apply_tests=$(echo "$apply_tests" | jq --argjson e "$entry" '. + [$e]')
          done

          echo "plan_tests=$(echo "$plan_tests" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "apply_tests=$(echo "$apply_tests" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "Discovered $(echo "$plan_tests" | jq 'length') plan tests"
          echo "Discovered $(echo "$apply_tests" | jq 'length') apply tests"

  # ── Plan each configuration YAML (matrix) ───────────────────────────────────
  # Each config gets its own runner → individual pass/fail in the GitHub UI.
  # Configs with externals blocks are skipped here (need live ARM token);
  # they are validated in the plan-all-configs job on push to main.
  plan-config:
    name: "Plan ${{ matrix.config }}"
    needs: [build-provider, generate-config-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.generate-config-matrix.outputs.configs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download provider artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-provider-rest
          path: ~/.terraform.d/plugins/

      - name: Install provider from artifact
        run: .github/scripts/restore-provider.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Plan configurations/${{ matrix.config }}.yaml
        env:
          TF_VAR_access_token: "placeholder"
          TF_VAR_config_file: "configurations/${{ matrix.config }}.yaml"
          # Placeholder subscription_id for configs that don't embed one in their YAML
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
        run: terraform plan -input=false -no-color

  # ── Plan each test file (matrix) ────────────────────────────────────────────
  # No Azure credentials needed — placeholder token.
  # Each test file gets its own runner → individual pass/fail in the GitHub UI.
  plan-test:
    name: "Test ${{ matrix.test.name }}"
    needs: [build-provider, generate-test-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.generate-test-matrix.outputs.plan_tests) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download provider artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-provider-rest
          path: ~/.terraform.d/plugins/

      - name: Install provider from artifact
        run: .github/scripts/restore-provider.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          rm -f .terraform.lock.hcl
          terraform init -backend=false

      - name: Test ${{ matrix.test.name }}
        env:
          TF_VAR_access_token: "placeholder"
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
        run: |
          if [ "${{ matrix.test.dir }}" = "tests/azure" ]; then
            terraform test -test-directory=tests/azure -filter="${{ matrix.test.file }}"
          else
            terraform test -filter="${{ matrix.test.file }}"
          fi

  # ── Register Azure providers — runs once before the apply-test matrix ───────
  # Idempotent: re-registers providers that tests depend on (e.g. CognitiveServices).
  # Separate job so every apply-test matrix entry doesn't repeat the apply.
  register-providers:
    name: "Register Azure providers"
    needs: build-provider
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write   # OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download provider artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-provider-rest
          path: ~/.terraform.d/plugins/

      - name: Install provider from artifact
        run: .github/scripts/restore-provider.sh

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Acquire Azure token
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "access_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Apply provider registrations
        env:
          TF_VAR_access_token: ${{ steps.token.outputs.access_token }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: ./tf.sh apply configurations/ci_test_providers.yaml

  # ── Apply each test file (matrix) ───────────────────────────────────────────
  # Requires Azure credentials — runs only on push to main.
  # Each test file gets its own runner → individual pass/fail in the GitHub UI.
  apply-test:
    name: "Test ${{ matrix.test.name }}"
    needs: [build-provider, generate-test-matrix, register-providers]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.generate-test-matrix.outputs.apply_tests) }}
    permissions:
      id-token: write   # OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download provider artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-provider-rest
          path: ~/.terraform.d/plugins/

      - name: Install provider from artifact
        run: .github/scripts/restore-provider.sh

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          rm -f .terraform.lock.hcl
          terraform init -backend=false

      - name: Acquire Azure token
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "access_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Test ${{ matrix.test.name }}
        env:
          TF_VAR_access_token: ${{ steps.token.outputs.access_token }}
          TF_VAR_azure_access_token: ${{ steps.token.outputs.access_token }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ "${{ matrix.test.dir }}" = "tests/azure" ]; then
            terraform test -test-directory=tests/azure -filter="${{ matrix.test.file }}"
          else
            terraform test -filter="${{ matrix.test.file }}"
          fi

  # ── Plan all configs with live token ────────────────────────────────────────
  # Validates externals + ci:requires-live-token configs skipped by plan-config.
  # Runs only on push to main.
  plan-all-configs:
    name: "Plan all configs (live token)"
    needs: build-provider
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write   # OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download provider artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-provider-rest
          path: ~/.terraform.d/plugins/

      - name: Install provider from artifact
        run: .github/scripts/restore-provider.sh

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          rm -f .terraform.lock.hcl
          terraform init -backend=false

      - name: Acquire Azure token
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "access_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Plan all configuration YAMLs
        env:
          TF_VAR_access_token: ${{ steps.token.outputs.access_token }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          # Live token resolves externals blocks — plan ALL configs including those
          # skipped by the plan-config matrix job.
          failed=0
          for config in configurations/*.yaml; do
            echo "=== Plan: $config ==="
            TF_VAR_config_file="$config" terraform plan -input=false -no-color \
              || { echo "FAILED: $config"; failed=$((failed + 1)); }
          done
          [ "$failed" -eq 0 ] || { echo "$failed configuration(s) failed to plan"; exit 1; }
