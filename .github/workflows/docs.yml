name: Generate Docs

on:
  push:
    branches: [main]
    paths:
      - "azure_*.tf"
      - "entraid_*.tf"
      - "github_*.tf"
      - "k8s_*.tf"
      - "scripts/generate-docs.py"
      - "modules/**/*.tf"
      - ".terraform-docs.yml"
  workflow_dispatch:

jobs:
  docs:
    name: "Regenerate YAML reference"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate docs/yaml-reference.md
        run: python3 scripts/generate-docs.py

      - name: Setup terraform-docs
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: modules
          recursive: true
          output-file: README.md
          output-method: replace
          git-push: "false"

      - name: Commit and push if changed
        # Only push on non-fork PRs and direct pushes to main — fork PRs have no write access
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/yaml-reference.md docs/yaml-reference-azure.md docs/yaml-reference-entraid.md docs/yaml-reference-github.md docs/yaml-reference-k8s.md modules/
          if git diff --staged --quiet; then
            echo "No documentation changes."
          else
            git commit -m "docs: regenerate yaml-reference and module READMEs [skip ci]"
            git push
          fi
