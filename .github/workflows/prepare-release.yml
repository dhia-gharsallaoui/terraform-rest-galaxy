name: Prepare Release

# ── Build flat Terraform root and create a semver tag ─────────────────────
#
# The Terraform registry serves the repo at the tagged commit. Consumers
# expect flat .tf files at root (they don't run build-galaxy.sh).
#
# This workflow:
#   1. Checks out main
#   2. Builds galaxy/ → .build/ (flat Terraform layout)
#   3. Copies flat .tf files to the repo root
#   4. Creates a release commit (reachable ONLY via the tag, not pushed to main)
#   5. Tags and pushes — triggers the Release (Semver) workflow
#
# Usage: Actions → Prepare Release → Run workflow → enter version (e.g. 1.2.0)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (e.g., 1.2.0, 1.3.0-rc.1)"
        required: true

jobs:
  prepare:
    name: "Build and tag release"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid version format: $VERSION (expected: X.Y.Z or X.Y.Z-pre.N)"
            exit 1
          fi
          if git tag -l "v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists. Delete it first or choose a different version."
            exit 1
          fi

      - name: Build galaxy (generate flat root for registry consumers)
        run: |
          scripts/build-galaxy.sh
          # Copy flat .tf files to repo root — this is what registry consumers download
          cp .build/*.tf .

      - name: Verify flat root
        run: |
          count=$(ls -1 azure__*.tf entraid__*.tf github__*.tf k8s__*.tf 2>/dev/null | wc -l)
          echo "Flat .tf files at root: $count"
          if [ "$count" -lt 10 ]; then
            echo "::error::Expected many flat .tf files at root, got $count"
            exit 1
          fi

      - name: Create tagged release commit
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.tf
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          # Push the tag (and its commit). The commit is NOT on any branch —
          # it's reachable only via the tag. main stays clean.
          git push origin "v${VERSION}"
          echo "::notice::Tag v${VERSION} created. The Release workflow will now run automatically."
