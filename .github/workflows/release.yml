name: Release (Semver)

# ── Release workflow triggered by semver tags ───────────────────────────────
# Trigger: Push tag matching v*.*.* (e.g., v1.0.0, v1.2.3)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  TF_VERSION: "1.14.5"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Validate semver tag ────────────────────────────────────────────────────
  validate-release:
    name: "Validate release"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
              echo "Stable release: v$VERSION"
          else
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              echo "Pre-release: v$VERSION"
          fi

  # ── Validate terraform ─────────────────────────────────────────────────────
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive .
        continue-on-error: true

      - name: Terraform validate (root)
        run: |
          rm -f .terraform.lock.hcl
          terraform init -backend=false
          terraform validate

      - name: Validate all module examples
        run: |
          for dir in examples/azure/*/*/; do
              echo "Validating: $dir"
              (cd "$dir" && terraform init -backend=false && terraform validate) || exit 1
          done

  # ── Discover plan-safe config YAMLs for matrix ──────────────────────────────
  generate-config-matrix:
    name: "Discover config matrix"
    runs-on: ubuntu-latest
    needs: validate-release
    outputs:
      configs: ${{ steps.list.outputs.configs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: List plan-safe configs
        id: list
        run: |
          # Exclude configs that require a live ARM token:
          #   - top-level externals: blocks (live ARM API calls at plan time)
          #   - # ci:requires-live-token marker (e.g. import configs with check_existance)
          # Output basenames without .yaml for clean matrix job names.
          configs=$(grep -rL "^externals:" configurations/*.yaml \
            | xargs grep -rL "^# ci:requires-live-token" \
            | sort \
            | xargs -I{} basename {} .yaml \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "configs=$configs" >> "$GITHUB_OUTPUT"
          echo "Discovered $(echo "$configs" | jq -r 'length') plan-safe configs"

  # ── Plan each configuration YAML (matrix) ───────────────────────────────────
  # Uses the published provider from the Terraform registry (no source build needed).
  # Each config gets its own runner → individual pass/fail visible in the release checks.
  plan-config:
    name: "Plan ${{ matrix.config }}"
    needs: [validate-release, generate-config-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.generate-config-matrix.outputs.configs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          rm -f .terraform.lock.hcl
          terraform init -backend=false

      - name: Plan configurations/${{ matrix.config }}.yaml
        env:
          TF_VAR_access_token: "placeholder"
          TF_VAR_config_file: "configurations/${{ matrix.config }}.yaml"
          # Placeholder subscription_id for configs that don't embed one in their YAML
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
        run: terraform plan -input=false -no-color

  # ── Run plan-only tests ────────────────────────────────────────────────────
  tests:
    name: "Run tests"
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          rm -f .terraform.lock.hcl
          terraform init -backend=false

      - name: Run plan-only config tests (tests/azure)
        env:
          TF_VAR_access_token: "placeholder"
        run: |
          # Auto-discover all config_*.tftest.hcl files in tests/azure/
          filters=()
          for f in tests/azure/config_*.tftest.hcl; do
            [ -f "$f" ] && filters+=("-filter=$f")
          done
          if [ ${#filters[@]} -gt 0 ]; then
            terraform test -test-directory=tests/azure "${filters[@]}"
          else
            echo "No config tests found in tests/azure/"
          fi

      - name: Run plan-only tests (tests/)
        env:
          TF_VAR_access_token: "placeholder"
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
        run: |
          # GitHub unit tests — always plan-safe (no Azure provider_check)
          filters=()
          for f in tests/unit_github_*.tftest.hcl; do
            [ -f "$f" ] && filters+=("-filter=$f")
          done
          # integration_config_* tests — only include those whose corresponding
          # configurations/<name>.yaml exists and has no externals block.
          for f in tests/integration_config_*.tftest.hcl; do
            name=$(basename "$f" .tftest.hcl | sed 's/^integration_config_//')
            yaml="configurations/${name}.yaml"
            if [ -f "$yaml" ] && ! grep -q "^externals:" "$yaml"; then
              filters+=("-filter=$f")
            fi
          done
          if [ ${#filters[@]} -gt 0 ]; then
            terraform test "${filters[@]}"
          else
            echo "No plan-only tests found"
          fi

  # ── Create release ─────────────────────────────────────────────────────────
  release:
    name: "Create release"
    runs-on: ubuntu-latest
    needs: [validate-release, validate, plan-config, tests]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z]" until the next "## [" or end of file
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
              echo "::warning::No CHANGELOG.md entry found for v$VERSION — falling back to git log"
              PREV_TAG=$(git describe --tags --abbrev=0 "v$VERSION"^ 2>/dev/null || echo "")
              if [ -n "$PREV_TAG" ]; then
                  COMMITS=$(git log "$PREV_TAG".."v$VERSION" --oneline | head -50)
              else
                  COMMITS=$(git log "v$VERSION" --oneline | head -50)
              fi
              NOTES="### Changes (auto-generated from commits)"$'\n\n'
              NOTES+="NOTE: This release has no structured CHANGELOG entry."$'\n'
              NOTES+="Future releases should update CHANGELOG.md before tagging."$'\n\n'
              NOTES+="\`\`\`"$'\n'"${COMMITS}"$'\n'"\`\`\`"
          fi

          # Write multi-line output
          {
            echo "notes<<RELEASE_EOF"
            echo "$NOTES"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Classify commit types for summary
        id: summary
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          TAG="v$VERSION"
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG"^ 2>/dev/null || echo "")

          BREAKING=0; FEAT=0; FIX=0; OTHER=0
          if [ -n "$PREV_TAG" ]; then
              RANGE="$PREV_TAG..$TAG"
          else
              RANGE="$TAG"
          fi

          while IFS= read -r msg; do
              case "$msg" in
                  *"BREAKING CHANGE"*|*"!"*:*) BREAKING=$((BREAKING+1)) ;;
                  feat*) FEAT=$((FEAT+1)) ;;
                  fix*) FIX=$((FIX+1)) ;;
                  *) OTHER=$((OTHER+1)) ;;
              esac
          done < <(git log "$RANGE" --format="%s")

          if [ "$BREAKING" -gt 0 ]; then
              PRIORITY="🔴 Critical — contains breaking changes"
          elif [ "$FEAT" -gt 0 ]; then
              PRIORITY="🟡 Recommended — new features"
          else
              PRIORITY="🟢 Optional — bug fixes and maintenance"
          fi

          {
            echo "priority<<PRIO_EOF"
            echo "$PRIORITY"
            echo "PRIO_EOF"
            echo "breaking=$BREAKING"
            echo "features=$FEAT"
            echo "fixes=$FIX"
          } >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          {
            echo "body<<BODY_EOF"
            echo "## v$VERSION"
            echo ""
            echo "### Upgrade Priority"
            echo "${{ steps.summary.outputs.priority }}"
            echo ""
            echo "${{ steps.changelog.outputs.notes }}"
            echo ""
            echo "---"
            echo ""
            echo "_Commit stats: ${{ steps.summary.outputs.breaking }} breaking, ${{ steps.summary.outputs.features }} features, ${{ steps.summary.outputs.fixes }} fixes_"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.validate-release.outputs.version }}"
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ needs.validate-release.outputs.is_prerelease }}
          generate_release_notes: true
