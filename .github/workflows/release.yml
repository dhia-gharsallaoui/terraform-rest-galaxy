name: Release (Semver)

# ── Release workflow triggered by semver tags ───────────────────────────────
# Trigger: Push tag matching v*.*.* (e.g., v1.0.0, v1.2.3)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  TF_VERSION: "1.14.5"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Validate semver tag ────────────────────────────────────────────────────
  validate-release:
    name: "Validate release"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
              echo "Stable release: v$VERSION"
          else
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              echo "Pre-release: v$VERSION"
          fi

  # ── Validate terraform ─────────────────────────────────────────────────────
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive .
        continue-on-error: true

      - name: Terraform validate (root)
        run: |
          rm -f .terraform.lock.hcl
          terraform init -backend=false
          terraform validate

      - name: Validate all module examples
        run: |
          for dir in examples/azure/*/*/; do
              echo "Validating: $dir"
              (cd "$dir" && terraform init -backend=false && terraform validate) || exit 1
          done

  # ── Run plan-only tests ────────────────────────────────────────────────────
  tests:
    name: "Run tests"
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          rm -f .terraform.lock.hcl
          terraform init -backend=false

      - name: Run plan-only tests
        env:
          TF_VAR_access_token: "placeholder"
        run: |
          terraform test \
            -test-directory=tests/azure \
            -filter=tests/azure/config_storage_account_cmk.tftest.hcl \
            -filter=tests/azure/config_vwan_secure_hub_routing_intent.tftest.hcl \
            -filter=tests/azure/config_acme_github_runners.tftest.hcl \
            || { echo "Tests failed"; exit 1; }

  # ── Create release ─────────────────────────────────────────────────────────
  release:
    name: "Create release"
    runs-on: ubuntu-latest
    needs: [validate-release, validate, tests]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          TAG="v$VERSION"
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG"^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log "$PREV_TAG".."$TAG" --oneline | head -50)
          else
              CHANGELOG=$(git log "$TAG" --oneline | head -50)
          fi
          {
            echo "body<<EOF"
            echo "## Release $TAG"
            echo ""
            echo "### Changes"
            echo '```'
            echo "$CHANGELOG"
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release v${{ needs.validate-release.outputs.version }}"
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ needs.validate-release.outputs.is_prerelease }}
          generate_release_notes: true
