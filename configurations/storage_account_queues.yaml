# Storage Account Queues
#
# This configuration creates two queues inside an existing storage account.
#
# Prerequisites:
#   - A storage account must exist (managed separately or via azure_storage_accounts)
#   - The storage account kind must support queues (StorageV2 or Storage)
#
#   export TF_VAR_access_token=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
#   TF_VAR_config_file=configurations/storage_account_queues.yaml terraform apply

terraform_backend:
  type: local

default_location: westeurope

azure_storage_account_queues:
  events:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: rg-myapp
    account_name: stmyapp001
    queue_name: events-queue
    metadata:
      environment: production
      purpose: event-processing
  notifications:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: rg-myapp
    account_name: stmyapp001
    queue_name: notifications
