# ══════════════════════════════════════════════════════════════════════════════

azure_federated_identity_credentials:
  # ── Global: branch-based (main + PR per domain UAI) ──
  global_networking_main:
    subscription_id:           ref:azure_subscriptions.global_identity.subscription_id
    resource_group_name:       ref:azure_resource_groups.global_identity.resource_group_name
    identity_name:             ref:azure_user_assigned_identities.global_networking.name
    federated_credential_name: github-oidc-main
    issuer:                    "https://token.actions.githubusercontent.com"
