# ══════════════════════════════════════════════════════════════════════════════
# Azure Subscriptions (16 = 4 tenants × 4 domains)
# ══════════════════════════════════════════════════════════════════════════════

azure_subscriptions:
  # ── Global tenant ──
  # NOTE: No _tenant on subscriptions — the Subscription Aliases API is a
  # global endpoint and must use the default access_token (home tenant identity
  # which holds the billing subscription creator role).
  global_networking:
    display_name:          "Contoso-Global-Networking"
    billing_scope:         ref:externals.azure_billing_scopes.contoso_invoice_section.billing_scope_id
    workload:              Production
    subscription_tenant_id: ref:externals.azure_tenants.contoso_global.tenant_id
  global_security:
    display_name:          "Contoso-Global-Security"
    billing_scope:         ref:externals.azure_billing_scopes.contoso_invoice_section.billing_scope_id
    workload:              Production
    subscription_tenant_id: ref:externals.azure_tenants.contoso_global.tenant_id
  global_identity:
    display_name:          "Contoso-Global-Identity"
    billing_scope:         ref:externals.azure_billing_scopes.contoso_invoice_section.billing_scope_id
    workload:              Production
    subscription_tenant_id: ref:externals.azure_tenants.contoso_global.tenant_id
  global_management:
    display_name:          "Contoso-Global-Management"
    billing_scope:         ref:externals.azure_billing_scopes.contoso_invoice_section.billing_scope_id
    workload:              Production
    subscription_tenant_id: ref:externals.azure_tenants.contoso_global.tenant_id

  # ── Dev tenant ──
  dev_networking:
    display_name:          "Contoso-Dev-Networking"
    billing_scope:         ref:externals.azure_billing_scopes.contoso_invoice_section.billing_scope_id
    workload:              DevTest
    subscription_tenant_id: ref:externals.azure_tenants.contoso_dev.tenant_id
  dev_security:
    display_name:          "Contoso-Dev-Security"
