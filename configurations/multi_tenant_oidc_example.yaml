# Contoso Platform — Multi-Tenant GitHub + Azure OIDC Infrastructure
#
# This configuration deploys the Contoso platform across 4 Azure AD tenants:
#
#   Global  (aaaa...0001) — automation hub, global resources (VPN, IPAM)
#   Dev     (aaaa...0002) — development environment
#   Prod    (aaaa...0003) — production environment
#   GDPR    (aaaa...0004) — GDPR-compliant workloads
#
# GitHub structure:
#   - Platform-Global repo         → branch-based OIDC (main + PR), repo-level vars
#   - Platform-{Networking,Security,Identity,Management} repos
#       → 3 environments each (dev, prod, gdpr) with per-env OIDC + env vars
#
# Each tenant × domain gets: subscription + RG + UAI + Owner role + FIC
#
# Prerequisites:
#   export TF_VAR_azure_access_token=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
#   export TF_VAR_github_token=$(gh auth token)
#   export TF_VAR_arm_tenant_tokens='{
#     "aaaaaaaa-1111-2222-3333-000000000001": "'$(az account get-access-token --resource https://management.azure.com --tenant contoso-global.onmicrosoft.com --query accessToken -o tsv)'",
#     "aaaaaaaa-1111-2222-3333-000000000002": "'$(az account get-access-token --resource https://management.azure.com --tenant contoso-dev.onmicrosoft.com --query accessToken -o tsv)'",
#     "aaaaaaaa-1111-2222-3333-000000000003": "'$(az account get-access-token --resource https://management.azure.com --tenant contoso-prod.onmicrosoft.com --query accessToken -o tsv)'",
#     "aaaaaaaa-1111-2222-3333-000000000004": "'$(az account get-access-token --resource https://management.azure.com --tenant contoso-gdpr.onmicrosoft.com --query accessToken -o tsv)'"
#   }'

default_location: swedencentral

# ── External references ─────────────────────────────────────────────────────
externals:
  github_organizations:
    contoso:
      org_name: "Contoso-Org"
      business_id: 274778489

  azure_tenants:
    contoso_global:
      tenant_id: "aaaaaaaa-1111-2222-3333-000000000001"
    contoso_dev:
      tenant_id: "aaaaaaaa-1111-2222-3333-000000000002"
    contoso_prod:
      tenant_id: "aaaaaaaa-1111-2222-3333-000000000003"
    contoso_gdpr:
      tenant_id: "aaaaaaaa-1111-2222-3333-000000000004"

  # NOTE: No _tenant on billing externals — the Billing API uses the default
  # access_token (home tenant identity which holds billing account owner role).
  azure_billing_accounts:
    contoso_billing:
      billing_account_name: "00000000-0000-0000-0000-000000000000:11111111-1111-1111-1111-111111111111_2019-05-31"

  azure_billing_scopes:
    contoso_invoice_section:
      billing_scope_id: "/providers/Microsoft.Billing/billingAccounts/00000000-0000-0000-0000-000000000000:11111111-1111-1111-1111-111111111111_2019-05-31/billingProfiles/S7D7-MVDN-BG7-PGB/invoiceSections/22222222-2222-2222-2222-222222222222"

# ══════════════════════════════════════════════════════════════════════════════
# Billing Tenant Associations
# ══════════════════════════════════════════════════════════════════════════════

azure_billing_associated_tenants:
  contoso_dev:
    billing_account_name: ref:externals.azure_billing_accounts.contoso_billing.billing_account_name
    tenant_id:            ref:externals.azure_tenants.contoso_dev.tenant_id
    display_name:         "Contoso Platform Dev"
    billing_management_state:      Active
    provisioning_management_state: Pending

  contoso_prod:
    billing_account_name: ref:externals.azure_billing_accounts.contoso_billing.billing_account_name
    tenant_id:            ref:externals.azure_tenants.contoso_prod.tenant_id
    display_name:         "Contoso Platform"
    billing_management_state:      Active
    provisioning_management_state: Pending

  contoso_gdpr:
    billing_account_name: ref:externals.azure_billing_accounts.contoso_billing.billing_account_name
    tenant_id:            ref:externals.azure_tenants.contoso_gdpr.tenant_id
    display_name:         "Contoso Platform GDPR"
    billing_management_state:      Active
    provisioning_management_state: Pending

# ══════════════════════════════════════════════════════════════════════════════
# GitHub Repositories (5)
# ══════════════════════════════════════════════════════════════════════════════

github_repositories:
  platform_global:
    organization:          ref:externals.github_organizations.contoso.org_name
    name:                  Platform-Global
    description:           "Contoso global automation hub (managed by terraform-rest-galaxy)"
    visibility:            private
    auto_init:             true
    gitignore_template:    Terraform
    license_template:      mit
    default_branch:        main
    has_issues:            true
    delete_branch_on_merge: true

